interface:
  display_name: "Git Push Guard"
  short_description: "Ask for repo and branch before pushing"
  default_prompt: "For TianyiParking or研发云 git work, first ask for the repo path, target remote, and target branch. If the branch is not explicit, ask which branch to push to. Verify status and remote, then commit and push only to the confirmed branch. Avoid assuming master/main."

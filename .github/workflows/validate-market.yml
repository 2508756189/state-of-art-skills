name: Validate Skill Market

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python scripts/test_build_market.py
      - name: Build registry
        run: python scripts/build_market.py
      - name: Check generated files are current
        run: git diff --exit-code -- market/index.json dist/skills
